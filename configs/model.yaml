  - log_mkt_cap
  - ret_5d
  - ret_21d
  - vol_5d
  - vol_21d
  - turnover_5d
  - turnover_21d
  - price_to_high
  - volume_spike
  - vol_ratio
  - turnover_ratio
  - ret_rel_to_ind
  # 分红历史节奏特征
  - days_since_last_div
  - gap_mean_exp
  - gap_med_exp
  - gap_std_exp
  - gap_mean_rN
  - gap_std_rN
  - gap_cv_exp
  - time_to_med_exp
  - z_to_med_exp
  - time_to_mean_rN
  - z_to_mean_rN
  - div_count_exp
  # 日历周期编码
  - weekday_sin
  - weekday_cos
  - month_sin
  - month_cos
  - doy_sin
  - doy_cos
  # DIVAMT 金额特征（新增）
